<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Password Generator | Apna Tools</title>
    <meta name="description" content="Generate secure, random passwords instantly with Apna Tools. Customizable length and character types for maximum security.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --bg: #ffffff;
            --gray-light: #f4f4f4;
            --gray-med: #e0e0e0;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            background-color: var(--bg);
            color: var(--primary);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 30px 0;
        }

        .brand {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .brand span {
            font-weight: 300;
            color: #666;
        }

        /* Main Tool Card */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            animation: fadeIn 0.8s ease;
        }

        .tool-card {
            background: white;
            border: 1px solid var(--gray-med);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p.description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* UI Components */
        .output-wrapper {
            position: relative;
            background: var(--gray-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70px;
        }

        #password-display {
            font-family: monospace;
            font-size: 1.4rem;
            letter-spacing: 2px;
            word-break: break-all;
            padding-right: 40px;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .copy-btn:hover {
            background: var(--gray-med);
        }

        /* Settings */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Action Section */
        .action-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-generate {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            flex-grow: 1;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #timer-display {
            font-size: 0.85rem;
            color: #888;
            min-width: 80px;
            font-variant-numeric: tabular-nums;
        }

        /* Footer */
        footer {
            padding: 20px 0;
            border-top: 1px solid var(--gray-med);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            margin-left: 15px;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .back-home {
            background: none;
            border: 1px solid var(--gray-med);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .back-home:hover {
            background: var(--primary);
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .processing {
            animation: pulse 0.5s infinite;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .tool-card { padding: 25px; }
            .settings-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
            .app-container { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand">Apna<span>Tools</span></div>
            <div id="status-dot" style="width: 8px; height: 8px; background: #4caf50; border-radius: 50%;"></div>
        </header>

        <main>
            <section class="tool-card">
                <h1>Password Generator</h1>
                <p class="description">Create instant, secure, and customizable passwords for your online accounts.</p>

                <div class="output-wrapper">
                    <div id="password-display">••••••••••••</div>
                    <button class="copy-btn" onclick="copyPassword()" title="Copy to clipboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>

                <div class="settings-grid">
                    <div class="setting-item" style="grid-column: span 2;">
                        <label>Length: <span id="len-val">12</span></label>
                        <input type="range" id="length" min="6" max="32" value="12" oninput="updateLenLabel()">
                    </div>
                    <div class="setting-item">
                        <input type="checkbox" id="uppercase" checked>
                        <label for="uppercase">ABC (Uppercase)</label>
                    </div>
                    <div class="setting-item">
                        <input type="checkbox" id="lowercase" checked>
                        <label for="lowercase">abc (Lowercase)</label>
                    </div>
                    <div class="setting-item">
                        <input type="checkbox" id="numbers" checked>
                        <label for="numbers">123 (Numbers)</label>
                    </div>
                    <div class="setting-item">
                        <input type="checkbox" id="symbols">
                        <label for="symbols">#$& (Symbols)</label>
                    </div>
                </div>

                <div class="action-area">
                    <button class="btn-generate" onclick="handleGenerate()">Generate Password</button>
                    <div id="timer-display">⏱ 0.0s</div>
                </div>
            </section>
        </main>

        <footer>
            <button class="back-home" onclick="location.reload()">← Back to Home</button>
            <div style="text-align: center;">
                <div>© 2026 Apna Tools</div>
                <div class="footer-links">
                    <a href="#">Privacy</a>
                    <a href="#">Terms</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const charSets = {
            uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lowercase: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-="
        };

        function updateLenLabel() {
            document.getElementById('len-val').innerText = document.getElementById('length').value;
        }

        function generatePassword() {
            const length = document.getElementById('length').value;
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            let allowedChars = "";
            if (useUpper) allowedChars += charSets.uppercase;
            if (useLower) allowedChars += charSets.lowercase;
            if (useNumbers) allowedChars += charSets.numbers;
            if (useSymbols) allowedChars += charSets.symbols;

            if (allowedChars === "") return "Select options!";

            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * allowedChars.length);
                password += allowedChars[randomIndex];
            }
            return password;
        }

        async function handleGenerate() {
            const timerEl = document.getElementById('timer-display');
            const displayEl = document.getElementById('password-display');
            const btn = document.querySelector('.btn-generate');
            
            // UI Feedback
            btn.disabled = true;
            displayEl.classList.add('processing');
            
            let startTime = performance.now();
            let timerInterval = setInterval(() => {
                let currentTime = (performance.now() - startTime) / 1000;
                timerEl.innerText = `⏱ ${currentTime.toFixed(1)}s`;
            }, 50);

            // Simulate slight delay for "work" visualization
            await new Promise(resolve => setTimeout(resolve, 400));

            const result = generatePassword();
            displayEl.innerText = result;
            
            // Stop timer
            clearInterval(timerInterval);
            let finalTime = (performance.now() - startTime) / 1000;
            timerEl.innerText = `⏱ ${finalTime.toFixed(2)}s`;
            
            displayEl.classList.remove('processing');
            btn.disabled = false;
        }

        function copyPassword() {
            const text = document.getElementById('password-display').innerText;
            if (text === "••••••••••••" || text === "Select options!") return;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<span style="font-size: 0.7rem; font-weight: 600;">COPIED!</span>';
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                }, 1500);
            });
        }
    </script>
</body>
</html>
