<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF to Word | Extraction Tool | Apna Tools</title>
    <meta name="description" content="Convert PDF to editable text and download it instantly. 100% private and offline extraction by Apna Tools.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #000000;
            --gray: #f8f9fa;
            --border: #e8e8e8;
            --shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* All-in-one screen */
            background-color: var(--bg);
            color: var(--text);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand { font-weight: 600; font-size: 1.2rem; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .tool-intro { text-align: center; animation: fadeInDown 0.5s ease; }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 5px; }
        .desc { color: #777; font-size: 0.9rem; margin-bottom: 15px; }

        .card {
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: fadeInUp 0.7s ease;
        }

        .drop-zone {
            width: 100%;
            padding: 30px 20px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .drop-zone:hover { border-color: var(--accent); background: var(--gray); }
        #fileInput { display: none; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            max-width: 280px;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #timer { font-family: monospace; color: #888; font-size: 0.85rem; margin-top: 10px; height: 15px; }

        /* Output View */
        #outputWrapper {
            margin-top: 20px;
            display: none;
            width: 100%;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .result-box {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--gray);
            padding: 12px;
            font-size: 0.8rem;
            resize: none;
            margin-bottom: 15px;
        }

        .download-section {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .filename-input {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            flex: 1;
        }

        .dl-btn {
            background: #f0f0f0;
            color: #000;
            width: auto;
            padding: 10px 20px;
            font-size: 0.85rem;
        }

        footer {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: #aaa;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">Apna Tools</div>
        <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; font-size: 0.8rem; color:#666;">Reset Tool</button>
    </header>

    <main>
        <div class="tool-intro">
            <h1>PDF to Word</h1>
            <p class="desc">Extract text and download as a custom file.</p>
        </div>

        <div class="card">
            <input type="file" id="fileInput" accept="application/pdf">
            <div class="drop-zone" id="dropZone">
                <div id="fileLabel">Drop PDF here or click to upload</div>
            </div>

            <div style="text-align: center;">
                <button class="btn" id="convertBtn">Start Extraction</button>
                <div id="timer"></div>
            </div>

            <div id="outputWrapper">
                <textarea id="resultText" class="result-box" readonly></textarea>
                
                <div class="download-section">
                    <input type="text" id="fileNameInput" class="filename-input" placeholder="Enter filename">
                    <button class="btn dl-btn" onclick="downloadFile()">Download .txt</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div>&copy; 2026 Apna Tools</div>
        <div>
            <a href="#" style="color:#aaa; text-decoration:none;">Privacy</a>
            <span style="margin: 0 10px;">|</span>
            <a href="#" style="color:#aaa; text-decoration:none;">Terms</a>
        </div>
    </footer>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const convertBtn = document.getElementById('convertBtn');
    const fileLabel = document.getElementById('fileLabel');
    const timerDisplay = document.getElementById('timer');
    const outputWrapper = document.getElementById('outputWrapper');
    const resultText = document.getElementById('resultText');
    const fileNameInput = document.getElementById('fileNameInput');

    let timerInterval;

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if(fileInput.files[0]) fileLabel.innerText = fileInput.files[0].name;
    });

    convertBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Select a PDF first.");

        convertBtn.disabled = true;
        outputWrapper.style.display = 'none';
        let startTime = Date.now();
        timerInterval = setInterval(() => {
            timerDisplay.innerText = `⏱ ${((Date.now() - startTime) / 1000).toFixed(1)}s`;
        }, 100);

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let extracted = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                extracted += content.items.map(s => s.str).join(' ') + "\n\n";
            }

            clearInterval(timerInterval);
            resultText.value = extracted;
            fileNameInput.value = file.name.replace(".pdf", "_converted");
            outputWrapper.style.display = 'block';
            convertBtn.disabled = false;
        } catch (e) {
            clearInterval(timerInterval);
            alert("Error parsing PDF.");
            convertBtn.disabled = false;
        }
    });

    function downloadFile() {
        const text = resultText.value;
        const name = fileNameInput.value || "extracted_text";
        const blob = new Blob([text], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = name + ".txt";
        link.click();
    }
</script>

</body>
</html>
