<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL Encoder & Decoder | Apna Tools</title>
    <meta name="description" content="Professional URL Encoder and Decoder by Apna Tools.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --accent: #000000;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        header {
            background: var(--bg-card);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { font-size: 1.3rem; font-weight: 800; letter-spacing: -1px; }
        .badge { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; vertical-align: middle; margin-left: 5px; }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .tool-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 850px;
            height: auto;
            max-height: 90%;
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .intro { text-align: center; margin-bottom: 1.5rem; }
        .intro h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
        .intro p { font-size: 0.9rem; color: var(--text-muted); }

        .workspace-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .box { display: flex; flex-direction: column; position: relative; }
        .box label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; color: var(--text-muted); }

        textarea {
            width: 100%;
            height: 120px;
            padding: 1.2rem;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: var(--transition);
            background: #fafafa;
        }

        textarea:focus { border-color: var(--accent); background: #fff; }

        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
        }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:active { transform: scale(0.98); }

        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        #timer { font-family: monospace; font-size: 0.85rem; color: var(--text-muted); }

        /* Fixed Copy Button Styling */
        .copy-container {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 5;
        }

        .copy-trigger {
            background: #000;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-trigger:hover { opacity: 0.8; }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            background: #fff;
        }

        @media (max-width: 600px) {
            .tool-card { padding: 1.5rem; border-radius: 20px; }
            .action-bar { flex-direction: column-reverse; gap: 1rem; }
            .btn-group { width: 100%; }
            .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Apna Tools<span class="badge">PRO</span></div>
        <div style="font-weight: 500; font-size: 0.85rem;">Free Web Utilities</div>
    </header>

    <main>
        <div class="tool-card">
            <div class="intro">
                <h1>URL Encoder & Decoder</h1>
                <p>Convert special characters safely for web addresses.</p>
            </div>

            <div class="workspace-grid">
                <div class="box">
                    <label>Input Text / URL</label>
                    <textarea id="input" placeholder="Example: hello world! & search=query"></textarea>
                </div>

                <div class="action-bar">
                    <div id="timer">⏱ 0.000s</div>
                    <div class="btn-group">
                        <button class="btn btn-outline" id="decodeBtn">Decode</button>
                        <button class="btn btn-primary" id="encodeBtn">Encode Now</button>
                    </div>
                </div>

                <div class="box">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                        <label style="margin-bottom: 0;">Result</label>
                        <button class="copy-trigger" id="copyBtn">Copy Result</button>
                    </div>
                    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer>
        © Apna Tools • Precise. Simple. Fast.
    </footer>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const encodeBtn = document.getElementById('encodeBtn');
        const decodeBtn = document.getElementById('decodeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const timerDisplay = document.getElementById('timer');

        let timerInt;

        function process(mode) {
            if(!input.value.trim()) return;

            let start = performance.now();
            clearInterval(timerInt);

            timerInt = setInterval(() => {
                let diff = (performance.now() - start) / 1000;
                timerDisplay.textContent = `⏱ ${diff.toFixed(3)}s`;
            }, 30);

            setTimeout(() => {
                try {
                    output.value = (mode === 'encode') 
                        ? encodeURIComponent(input.value) 
                        : decodeURIComponent(input.value);
                } catch(e) {
                    output.value = "⚠️ Error: Invalid format.";
                }
                
                clearInterval(timerInt);
                let final = (performance.now() - start) / 1000;
                timerDisplay.textContent = `⏱ ${final.toFixed(3)}s`;
            }, 100);
        }

        encodeBtn.addEventListener('click', () => process('encode'));
        decodeBtn.addEventListener('click', () => process('decode'));

        input.addEventListener('input', () => {
            if(!input.value.trim()) {
                output.value = "";
                timerDisplay.textContent = "⏱ 0.000s";
                return;
            }
            try { output.value = encodeURIComponent(input.value); } catch(e) {}
        });

        copyBtn.addEventListener('click', () => {
            if(!output.value) return;
            navigator.clipboard.writeText(output.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied ✅";
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            });
        });
    </script>
</body>
</html>
